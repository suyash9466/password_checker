<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Checker — Task 03</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="container">
    <header>
      <h1>Password Strength Checker</h1>
      <p class="subtitle">See how secure your password really is</p>
      <span class="session-badge" id="session-badge">
        Checks this session: {{ check_count }}
      </span>
    </header>

    <div class="card">
      <div class="input-wrap">
        <input
          type="password"
          id="password-input"
          placeholder="Type your password..."
          autocomplete="off"
          spellcheck="false"
          maxlength="256"
        />
        <button id="toggle-btn" type="button" title="Show/hide password">👁</button>
      </div>

      <div class="bar-wrap">
        <div class="bar-track">
          <div class="bar-fill" id="bar-fill"></div>
        </div>
        <span class="strength-label" id="strength-label">—</span>
      </div>

      <div class="stats-row" id="stats-row" style="display:none">
        <div class="stat-pill">
          <span class="stat-num" id="stat-len">0</span>
          <span class="stat-desc">chars</span>
        </div>
        <div class="stat-pill">
          <span class="stat-num" id="stat-score">0/8</span>
          <span class="stat-desc">score</span>
        </div>
        <div class="stat-pill">
          <span class="stat-num" id="stat-pct">0%</span>
          <span class="stat-desc">strength</span>
        </div>
      </div>

      <div class="checklist" id="checklist"></div>

      <div class="tips-box" id="tips-box" style="display:none">
        <p class="tips-title">Suggestions</p>
        <ul id="tips-list"></ul>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
